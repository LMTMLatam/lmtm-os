name: keepalive

# Keep LMTM-OS and its self-hosted OpenWA (sidecar on port 8080) alive, and
# fail loudly (→ GitHub's default email to watchers) when the WhatsApp
# session needs a human to re-scan the QR.
# - pings /api/health on LMTM-OS every 5 minutes
# - pings /api/wa-bot/public-health on LMTM-OS every 5 minutes
# - if WA bot reports unhealthy, triggers /api/wa-bot/keepalive to force reconnect
# - if the bot reports needsPairing after the reconnect attempt, fails the job on
#   purpose (a session that was logged out needs someone to scan a fresh QR in the
#   WhatsApp panel — this is the only channel left to say so once it's down)
# - on hard LMTM-OS failure, exits non-zero so the run is marked failed
#
# IMPORTANT: read the bot's explicit health booleans (bot.connected /
# bot.needsPairing), NOT the status STRING. A logged-out session waiting for a QR
# reports status "connecting" (SCAN_QR), never "disconnected" — grepping for
# "disconnected" (as an earlier version did) meant the "human must re-scan"
# alarm essentially never fired. needsPairing is set server-side precisely when a
# human must act, so transient "connecting" during an automatic reconnect does
# NOT trigger a false-positive failure email.
#
# IMPORTANT: this targets the Railway production deployment. LMTM-OS migrated
# off Render on 2026-06-22; Render is now suspended. Do not repoint this at
# *.onrender.com again — pointing it at a suspended service makes every run
# fail for an unrelated reason, which buries the real signal (see history:
# this workflow silently failed on every run for days after the migration
# because nobody updated the URL — turning the one automated safety net for
# "WhatsApp needs reconnecting" into permanent, ignored noise).

on:
  schedule:
    # Every 5 minutes — keeps LMTM-OS warm AND triggers reconnect
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_reconnect:
        description: "Force WA bot reconnect"
        required: false
        default: "false"

permissions:
  contents: read

env:
  LMTM_BASE_URL: https://lmtm-os-production.up.railway.app

jobs:
  ping:
    name: LMTM-OS keepalive
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping LMTM-OS /api/health
        run: |
          set -e
          echo "Pinging $LMTM_BASE_URL/api/health"
          HTTP_CODE=$(curl -sS -o /tmp/lmtm-health.json -w "%{http_code}" \
            --max-time 30 \
            "$LMTM_BASE_URL/api/health" || echo "000")
          echo "HTTP $HTTP_CODE"
          cat /tmp/lmtm-health.json || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::LMTM-OS /api/health returned $HTTP_CODE"
            exit 1
          fi

      - name: Ping LMTM-OS /api/wa-bot/public-health
        id: wa_health
        continue-on-error: true
        run: |
          echo "Pinging $LMTM_BASE_URL/api/wa-bot/public-health"
          HTTP_CODE=$(curl -sS -o /tmp/wa-health.json -w "%{http_code}" \
            --max-time 30 \
            "$LMTM_BASE_URL/api/wa-bot/public-health" || echo "000")
          echo "HTTP $HTTP_CODE"
          cat /tmp/wa-health.json 2>/dev/null | python3 -m json.tool 2>/dev/null || cat /tmp/wa-health.json || true

          # Parse the health booleans with python (robust vs grepping JSON).
          # needs_reconnect when: 503, OpenWA unreachable, or the bot isn't
          # connected. `connected` defaults to true only on parse failure so an
          # older deploy without the field doesn't spam reconnects.
          # NOTE: the heredoc body MUST stay indented at the step-script level.
          # These lines sit inside a YAML block scalar (run: |) — at column 1
          # they terminate the block and break the whole workflow file, which
          # kills the cron schedule entirely (this exact mistake left the bot
          # disconnected for 14h on 2026-07-02). GH strips the common
          # indentation, so the shell still sees the delimiter at column 1.
          NEEDS=$(python3 - "$HTTP_CODE" <<'PY'
          import json, sys
          code = sys.argv[1]
          if code == "503":
              print("true"); sys.exit()
          if code != "200":
              print("false"); sys.exit()
          try:
              h = json.load(open("/tmp/wa-health.json"))
          except Exception:
              print("false"); sys.exit()
          openwa = h.get("openwa", {})
          bot = h.get("bot", {})
          if openwa.get("configured") and openwa.get("reachable") is False:
              print("true"); sys.exit()
          # connected defaults True when the field is absent (older deploy) to avoid churn
          print("false" if bot.get("connected", True) else "true")
          PY
          )
          echo "needs_reconnect=$NEEDS" >> "$GITHUB_OUTPUT"
          [ "$NEEDS" = "true" ] && echo "::warning::WA bot not connected / OpenWA unreachable - will trigger keepalive" || true

      - name: Trigger keepalive if needed
        id: reconnect
        if: steps.wa_health.outputs.needs_reconnect == 'true' || github.event.inputs.force_reconnect == 'true'
        run: |
          echo "POSTing $LMTM_BASE_URL/api/wa-bot/keepalive"
          HTTP_CODE=$(curl -sS -o /tmp/keepalive.json -w "%{http_code}" \
            -X POST --max-time 30 \
            "$LMTM_BASE_URL/api/wa-bot/keepalive" || echo "000")
          echo "HTTP $HTTP_CODE"
          cat /tmp/keepalive.json 2>/dev/null | python3 -m json.tool 2>/dev/null || cat /tmp/keepalive.json || true

          sleep 5
          echo "---"
          echo "Re-checking $LMTM_BASE_URL/api/wa-bot/public-health"
          curl -sS "$LMTM_BASE_URL/api/wa-bot/public-health" --max-time 30 -o /tmp/wa-health-recheck.json || true
          cat /tmp/wa-health-recheck.json 2>/dev/null | python3 -m json.tool 2>/dev/null || cat /tmp/wa-health-recheck.json || true

          # Only fail when the bot explicitly needs a human to scan a QR
          # (needsPairing). A bot still "connecting" right after keepalive is an
          # automatic reconnect in progress — NOT a human-action state — so we
          # don't fail on it and spam false-positive emails.
          # Same indentation rule as the heredoc above — never at column 1.
          RESULT=$(python3 - <<'PY'
          import json
          try:
              bot = json.load(open("/tmp/wa-health-recheck.json")).get("bot", {})
          except Exception:
              print("unknown"); raise SystemExit
          if bot.get("needsPairing"):
              print("needs_pairing")
          elif bot.get("connected"):
              print("connected")
          else:
              print("reconnecting")
          PY
          )
          echo "post-reconnect state: $RESULT"
          if [ "$RESULT" = "needs_pairing" ]; then
            echo "::error::WhatsApp session is logged out and needs a HUMAN to open the WhatsApp panel and scan a fresh QR — it cannot self-heal. Open the panel's WhatsApp section and re-pair."
            exit 1
          fi
