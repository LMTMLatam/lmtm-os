name: keepalive

# Keep LMTM-OS and its self-hosted OpenWA (sidecar on port 8080) alive.
# - pings /api/health on LMTM-OS every 5 minutes
# - pings /api/wa-bot/public-health on LMTM-OS every 5 minutes
# - if WA bot reports unhealthy, triggers /api/wa-bot/keepalive to force reconnect
# - on hard LMTM-OS failure, exits non-zero so the run is marked failed
#
# OpenWA is now a sidecar inside the LMTM-OS container (port 8080),
# so the /api/wa-bot/public-health endpoint is the single source of
# truth for both services' health.
#
# Schedule rationale: Render starter plan spins down idle services
# after 15 min, so we keep LMTM-OS warm with a 5-min ping. Same for
# WhatsApp watcher — the sidecar OpenWA stays alive as long as the
# container is warm, but we ping every 5 min to make sure.

on:
  schedule:
    # Every 5 minutes — keeps Render warm AND triggers reconnect
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_reconnect:
        description: "Force WA bot reconnect"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  ping:
    name: LMTM-OS keepalive
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping LMTM-OS /api/health
        run: |
          set -e
          echo "Pinging https://lmtm.onrender.com/api/health"
          HTTP_CODE=$(curl -sS -o /tmp/lmtm-health.json -w "%{http_code}" \
            --max-time 30 \
            "https://lmtm.onrender.com/api/health" || echo "000")
          echo "HTTP $HTTP_CODE"
          cat /tmp/lmtm-health.json || true
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::LMTM-OS /api/health returned $HTTP_CODE"
            exit 1
          fi

      - name: Ping LMTM-OS /api/wa-bot/public-health
        id: wa_health
        continue-on-error: true
        run: |
          echo "Pinging https://lmtm.onrender.com/api/wa-bot/public-health"
          HTTP_CODE=$(curl -sS -o /tmp/wa-health.json -w "%{http_code}" \
            --max-time 30 \
            "https://lmtm.onrender.com/api/wa-bot/public-health" || echo "000")
          echo "HTTP $HTTP_CODE"
          cat /tmp/wa-health.json 2>/dev/null | python3 -m json.tool 2>/dev/null || cat /tmp/wa-health.json || true

          if [ "$HTTP_CODE" = "503" ]; then
            echo "::warning::WA bot reports unhealthy (503) - will trigger keepalive"
            echo "needs_reconnect=true" >> "$GITHUB_OUTPUT"
          elif [ "$HTTP_CODE" = "200" ]; then
            if grep -q '"reachable":\s*false' /tmp/wa-health.json 2>/dev/null; then
              echo "::warning::OpenWA unreachable from LMTM-OS - will trigger keepalive"
              echo "needs_reconnect=true" >> "$GITHUB_OUTPUT"
            else
              echo "needs_reconnect=false" >> "$GITHUB_OUTPUT"
            fi
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::warning::public-health endpoint not available yet (older deploy)"
            echo "needs_reconnect=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs_reconnect=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger keepalive if needed
        if: steps.wa_health.outputs.needs_reconnect == 'true' || github.event.inputs.force_reconnect == 'true'
        continue-on-error: true
        run: |
          echo "POSTing https://lmtm.onrender.com/api/wa-bot/keepalive"
          HTTP_CODE=$(curl -sS -o /tmp/keepalive.json -w "%{http_code}" \
            -X POST --max-time 30 \
            "https://lmtm.onrender.com/api/wa-bot/keepalive" || echo "000")
          echo "HTTP $HTTP_CODE"
          cat /tmp/keepalive.json 2>/dev/null | python3 -m json.tool 2>/dev/null || cat /tmp/keepalive.json || true

          sleep 5
          echo "---"
          echo "Re-checking /api/wa-bot/public-health"
          curl -sS "https://lmtm.onrender.com/api/wa-bot/public-health" --max-time 30 | python3 -m json.tool 2>/dev/null || true
