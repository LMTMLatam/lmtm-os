# render.yaml - Render service definition for LMTM OS
#
# This single web service runs both:
#   - LMTM-OS server on port 3100
#   - OpenWA (Baileys engine) on port 2785 — pure WebSocket, no browser
# They share the same container, so OPENWA_URL=http://localhost:2785.
#
# We use OpenWA (rmyndharis/OpenWA) with the @whiskeysockets/baileys
# engine plugin baked in. Unlike browser-based libs (wa-automate,
# whatsapp-web.js), Baileys connects directly via WebSocket to WhatsApp
# servers — no anti-bot detection from datacenter IPs.

services:
  - type: web
    name: lmtm
    repo: https://github.com/LMTMLatam/lmtm-os
    branch: feat/lmtm-v2-m3-agents
    plan: starter
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @paperclipai/plugin-sdk build && pnpm --filter @paperclipai/adapter-minimax-local build && pnpm --filter @paperclipai/server build
    startCommand: node --import ./server/node_modules/tsx/dist/loader.mjs server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3100"
      - key: SERVE_UI
        value: "false"
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_INSTANCE_ID
        value: lmtm
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: DATABASE_URL
        sync: false
      - key: OPENCODE_ALLOW_ALL_MODELS
        value: "true"
      - key: PAPERCLIP_MIGRATION_AUTO_APPLY
        value: "true"
      # OpenWA self-hosted: same container, port 2785
      - key: OPENWA_URL
        value: http://localhost:2785
      - key: OPENWA_API_KEY
        generateValue: true
      - key: OPENWA_PORT
        value: "2785"
      - key: ENGINE_TYPE
        value: baileys
      - key: DATABASE_TYPE
        value: sqlite
      - key: LOG_LEVEL
        value: info
      - key: OPENWA_SELF_HOSTED_DISABLED
        value: "true"
      # Auto-applied via PAPERCLIP_AUTH_PUBLIC_BASE_URL at runtime
      # (start.sh constructs the webhook URL from this + /api/wa-bot/webhook)
      - key: PAPERCLIP_AUTH_PUBLIC_BASE_URL
        sync: false
